name: docs

# Build the Sphinx documentation and deploy it to GitHub Pages.
#
# NOTE: For the deploy to work, enable Pages in the repo settings with
#       "Build and deployment" -> Source -> "GitHub Actions".

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # ── Fast check of external Markdown links in the source files ──────────────
  check-external-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check external links in Markdown files
        run: ./scripts/check_markdown_links.sh

  # ── Build the HTML site (executes the notebooks) and proof the output ──────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install the package with docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[docs]"

      - name: Build the docs
        run: sphinx-build -b html -W --keep-going docs docs/_build/html

      - name: Set up Ruby (for html-proofer)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install html-proofer
        run: gem install html-proofer -v ">= 5.0.9"

      - name: Proof built HTML links
        run: |
          htmlproofer docs/_build/html \
            --checks Links,Scripts,Images \
            --assume-extension \
            --check-external-hash \
            --ignore-status-codes 0,400,403,302,503 \
            --ignore-urls "https://pillowlab.princeton.edu/data/data_RGCs.zip" \
            --ignore-files "/.+\/_static\/.+/"

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  # ── Deploy to GitHub Pages (only from main) ────────────────────────────────
  deploy:
    if: github.ref == 'refs/heads/main'
    needs:
      - check-external-links
      - build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4